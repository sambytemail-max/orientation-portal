<!DOCTYPE html>
<html>
<head>
    <title>Veritas Orientation Form</title>
</head>
<body>

<form action="#" method="post">

<fieldset>
    <legend>Student Orientation Registration</legend>

    
    <label for="fullname">Full Name:</label><br>
    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required><br><br>

    
    <label for="matric">Matric Number:</label><br>
    <input type="text" id="matric" name="matric" placeholder="Enter your matric number" required><br><br>

    
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="Enter your email" required><br><br>

    
    <label for="age">Age:</label><br>
    <input type="number" id="age" name="age" required><br><br>

    
    <p>Gender:</p>
    <input type="radio" id="male" name="gender" value="Male" required>
    <label for="male">Male</label>

    <input type="radio" id="female" name="gender" value="Female">
    <label for="female">Female</label><br><br>

    
    <label for="dob">Date of Birth:</label><br>
    <input type="date" id="dob" name="dob" required><br><br>

    <label for="faculty">Faculty:</label><br>
    <select id="faculty" name="faculty" required>
        <option value="">--Select Faculty--</option>
        <option value="science">Science</option>
        <option value="arts">Arts</option>
        <option value="management">Management Sciences</option>
    </select><br><br>


    <p>Documents Submitted:</p>
    <input type="checkbox" id="admission" name="docs" value="Admission Letter">
    <label for="admission">Admission Letter</label>

    <input type="checkbox" id="receipt" name="docs" value="Payment Receipt">
    <label for="receipt">Payment Receipt</label><br><br>

    
   <label for="passport">Upload Passport</label><br>
    <input type="file" id="passport" name="passport"><br><br>

    
    <label for="comments">Additional Comments</label><br>
    <textarea id="comments" name="comments" rows="4" cols="40" placeholder="Enter any extra info..."></textarea><br><br>

    
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
                                <center>OBIECHINA IFEANYICHUKWU SAMUEL VUG/SEN/25/14553</center>
</fieldset>

</form>

</body>
</html>
